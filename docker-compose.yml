services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-fastshop}
      POSTGRES_USER: ${DB_USER:-fastshop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fastshop_secret}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fastshop} -d ${DB_NAME:-fastshop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fastshop}
      DB_USER: ${DB_USER:-fastshop}
      DB_PASSWORD: ${DB_PASSWORD:-fastshop_secret}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
